[build]
  publish = "."

# ============================================================
# ★安全対策：万一 .git フォルダ等を含めてアップロードしてしまっても、
#   外部からは見えないようにブロックする「保険」のルール。
#   （基本は「.git を含めずにアップロードする」運用が第一。README参照）
# ============================================================
[[redirects]]
  from = "/.git/*"
  to   = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from = "/.gitignore"
  to   = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from = "/*/.DS_Store"
  to   = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from = "/.DS_Store"
  to   = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404
