<style>
  /* =========================================================
     【この記事専用スタイル】横長メイン画像2枚を「カルーセル」で表示
     ・カルーセルの初回実装（2026-07-10）／操作バーを写真の下へ変更（2026-07-10 改）。
       記事ページ内に完結。グローバルの css/style.css・js/main.js には手を加えていません。
     ・操作ボタン（矢印・ドット）は写真の下の操作バーにまとめ、写真には重ねない。
       スワイプ／キーボード←→ にも対応。
     ・クラス名は衝突回避のため .news-carousel / .nc-* に統一
     【調整】--nc-max＝カルーセルの最大幅（横長向け）
     ========================================================= */
  .news-carousel{
    --nc-max:720px;              /* 【調整】カルーセルの最大横幅 */
    position:relative;
    max-width:var(--nc-max);
    margin:0 auto 8px;           /* 中央揃え */
  }
  .nc-viewport{
    position:relative;
    overflow:hidden;
    border-radius:10px;
  }
  .nc-track{
    display:flex;
    align-items:center;
    transition:transform .35s ease;
    will-change:transform;
  }
  .nc-slide{
    flex:0 0 100%;
    margin:0;
  }
  .nc-slide img{
    width:100%;
    height:auto;
    display:block;
  }
  /* キャプション（スライドに応じて切り替え） */
  .nc-cap{
    text-align:center;
    font-size:13px;
    color:#6B7280;               /* デザイン仕様のサブグレー */
    margin:8px 0 0;
  }
  /* 操作バー（写真の下・重ねない）：矢印 ─ ドット ─ 矢印 を中央に並べる */
  .nc-controls{
    display:flex;align-items:center;justify-content:center;gap:14px;
    margin-top:8px;
  }
  /* 左右の矢印（タップ領域44px以上） */
  .nc-arrow{
    flex:0 0 auto;
    width:44px;height:44px;
    border:none;border-radius:50%;
    background:rgba(75,20,145,0.55);      /* サイトの紫ピルと同系色 */
    color:#fff;font-size:26px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    touch-action:manipulation;
  }
  @media (hover:hover) and (pointer:fine){
    .nc-arrow:hover{ background:rgba(75,20,145,0.78); }
  }
  /* ドット（現在位置＝紫） */
  .nc-dots{
    display:flex;align-items:center;gap:10px;
  }
  .nc-dot{
    position:relative;
    width:10px;height:10px;padding:0;
    border:none;border-radius:50%;
    background:#D1D5DB;cursor:pointer;
    touch-action:manipulation;
  }
  .nc-dot.is-active{ background:#6D28D9; }
  .nc-dot::before{                /* 見た目は10pxでも当たり判定を拡大 */
    content:"";position:absolute;top:-14px;left:-14px;right:-14px;bottom:-14px;
  }
  @media (prefers-reduced-motion: reduce){
    .nc-track{ transition:none; }
  }
</style>
</head>

<!-- ===== カルーセル動作（この記事ページ内に限定・グローバルJSは変更なし）===== -->
<script>
(function(){
  var carousel = document.querySelector('.news-carousel');
  if(!carousel){ return; }
  var track  = carousel.querySelector('.nc-track');
  var slides = carousel.querySelectorAll('.nc-slide');
  var dots   = carousel.querySelectorAll('.nc-dot');
  var capEl  = carousel.querySelector('.nc-cap');
  var caps   = ['結果', '結果'];   /* 【調整】各スライドのキャプション */
  var count  = slides.length;
  var idx    = 0;

  function go(n){
    idx = (n + count) % count;
    track.style.transform = 'translateX(' + (-idx * 100) + '%)';
    for(var i = 0; i < dots.length; i++){
      dots[i].classList.toggle('is-active', i === idx);
    }
    if(capEl){ capEl.textContent = caps[idx] || ''; }
  }

  var prev = carousel.querySelector('.nc-prev');
  var next = carousel.querySelector('.nc-next');
  if(prev){ prev.addEventListener('click', function(){ go(idx - 1); }); }
  if(next){ next.addEventListener('click', function(){ go(idx + 1); }); }
  for(var d = 0; d < dots.length; d++){
    (function(i){ dots[i].addEventListener('click', function(){ go(i); }); })(d);
  }

  /* キーボード（←→） */
  carousel.addEventListener('keydown', function(e){
    if(e.key === 'ArrowLeft'){ go(idx - 1); }
    else if(e.key === 'ArrowRight'){ go(idx + 1); }
  });

  /* スワイプ（タッチ） */
  var startX = null, dx = 0;
  var vp = carousel.querySelector('.nc-viewport');
  vp.addEventListener('touchstart', function(e){ startX = e.touches[0].clientX; dx = 0; }, {passive:true});
  vp.addEventListener('touchmove',  function(e){ if(startX !== null){ dx = e.touches[0].clientX - startX; } }, {passive:true});
  vp.addEventListener('touchend',   function(){
    if(startX !== null){
      if(dx < -40){ go(idx + 1); }
      else if(dx > 40){ go(idx - 1); }
      startX = null; dx = 0;
    }
  });

  go(0);
})();
</script>

<script src="/js/layout.js"></script>
